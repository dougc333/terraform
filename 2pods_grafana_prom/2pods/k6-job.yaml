apiVersion: batch/v1
kind: Job
metadata:
  name: k6-hpa-load
  labels:
    app.kubernetes.io/name: k6
    app.kubernetes.io/part-of: autoscaling-demo
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k6
        app.kubernetes.io/part-of: autoscaling-demo
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: k6
          image: grafana/k6:2.0.0
          imagePullPolicy: IfNotPresent
          args:
            - run
            - --quiet
            - --out
            - experimental-prometheus-rw
            - /scripts/test.js
          env:
            - name: TARGET_URL
              value: http://web:80
            - name: K6_PROMETHEUS_RW_SERVER_URL
              value: http://prometheus:9090/api/v1/write
            - name: K6_PROMETHEUS_RW_TREND_STATS
              value: p(95),avg,max
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: k6-hpa-script
